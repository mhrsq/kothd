# Vulnerable FTP configuration
listen=YES
listen_ipv6=NO
anonymous_enable=YES
anon_root=/srv/ftp
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES
anon_upload_enable=NO
anon_mkdir_write_enable=NO
# VULNERABLE: Shows hidden files including .credentials.bak
force_dot_files=YES
ftpd_banner=Welcome to Service Bastion FTP Server
secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd
# VULNERABLE: No SSL required
ssl_enable=NO
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40100
# Allow local user uploads
local_root=/srv/ftp
chroot_local_user=NO
allow_writeable_chroot=YES
