version: '3.8'

services:
  service-bastion:
    build: .
    container_name: hill2-service-bastion
    hostname: service-bastion
    ports:
      - "2222:22"           # SSH for teams
      - "21:21"             # FTP
      - "9999:9999"         # TCP management console (SLA check target)
      - "40000-40100:40000-40100"  # FTP passive ports
    restart: unless-stopped
    privileged: true
    volumes:
      - svc-data:/opt/services/data
      - /root/king.txt:/root/king.txt  # Host king.txt mounted
    environment:
      - SERVICE_NAME=service-bastion

volumes:
  svc-data:
