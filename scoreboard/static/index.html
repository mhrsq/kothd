<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoTH CTF — Live Scoreboard</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>
    <!-- Timer/Tick bar (below global navbar) -->
    <div class="game-bar">
        <div class="game-bar-inner">
            <div class="game-timer" id="game-timer">
                <span class="timer-label">TIME</span>
                <span class="timer-value" id="timer-display">--:--:--</span>
            </div>
            <div class="tick-counter">
                <span class="tick-label">TICK</span>
                <span class="tick-value" id="tick-display">#0</span>
            </div>
        </div>
    </div>
    <style>
        .game-bar{background:linear-gradient(135deg,#0f172a,#1a2332);border-bottom:1px solid #2a3a4e;padding:10px 32px;}
        [data-theme="light"] .game-bar{background:linear-gradient(135deg,#e2e8f0,#f1f5f9);border-bottom-color:#cbd5e1;}
        .game-bar-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:center;gap:40px;}
    </style>

    <!-- ── Main Content ── -->
    <main class="main">
        <!-- Hill Status Cards -->
        <section class="hills-section">
            <h2 class="section-title">🏔️ Hill Status</h2>
            <div class="hills-grid" id="hills-grid">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- Leaderboard -->
        <section class="leaderboard-section">
            <div class="leaderboard-header">
                <h2 class="section-title">🏆 Leaderboard</h2>
                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                    <input type="text" id="leaderboardSearch" placeholder="Search team..." oninput="filterLeaderboard()" style="background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border);padding:6px 12px;border-radius:6px;font-size:12px;font-family:var(--font-sans);width:180px;outline:none;">
                    <div class="category-tabs">
                        <button class="tab active" data-category="all" onclick="filterCategory('all')">All</button>
                        <!-- Category tabs populated dynamically -->
                    </div>
                </div>
            </div>
            <div class="leaderboard-table-wrap">
                <table class="leaderboard-table" id="leaderboard-table">
                    <thead>
                        <tr>
                            <th class="col-rank">#</th>
                            <th class="col-team">Team</th>
                            <th class="col-cat">Category</th>
                            <th class="col-points">Points</th>
                            <th class="col-hills">Hills</th>
                            <th class="col-ticks">Ticks King</th>
                            <th class="col-fb">First Blood</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Event Feed -->
        <section class="events-section">
            <h2 class="section-title">📡 Live Feed</h2>
            <div class="event-feed" id="event-feed">
                <div class="event-item system">
                    <span class="event-time">--:--:--</span>
                    <span class="event-text">Waiting for server connection...</span>
                </div>
            </div>
        </section>

        <!-- First Bloods -->
        <section class="first-bloods-section">
            <h2 class="section-title">🩸 First Bloods</h2>
            <div class="first-bloods-grid" id="first-bloods-grid">
                <!-- Populated by JS -->
            </div>
        </section>
    </main>

    <!-- ── Footer ── -->
    <footer class="footer">
        <p>KoTH CTF Platform — Powered by kothd</p>
    </footer>

    <!-- ── Notification Toast ── -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/navbar.js"></script>
    <script src="/static/js/scoreboard.js"></script>
</body>
</html>
