<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoTH CTF — Login</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <style>
        :root {
            --bg-primary: #0a0e17; --bg-secondary: #111827; --bg-card: #1a2332;
            --border: #2a3a4e; --text-primary: #e2e8f0; --text-secondary: #94a3b8; --text-muted: #64748b;
            --accent-green: #22c55e; --accent-red: #ef4444; --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4; --accent-orange: #f97316; --accent-purple: #a855f7;
            --font-mono: 'JetBrains Mono', monospace; --font-sans: 'Inter', sans-serif;
        }
        [data-theme="light"] {
            --bg-primary: #f8fafc; --bg-secondary: #f1f5f9; --bg-card: #ffffff;
            --border: #cbd5e1; --text-primary: #1e293b; --text-secondary: #475569; --text-muted: #94a3b8;
            --accent-green: #16a34a; --accent-red: #dc2626; --accent-blue: #2563eb;
            --accent-cyan: #0891b2; --accent-orange: #ea580c; --accent-purple: #9333ea;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(34,197,94,.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(6,182,212,.06) 0%, transparent 50%);
        }

        .login-container {
            width: 100%; max-width: 480px; padding: 20px;
        }

        /* Logo area */
        .brand { text-align: center; margin-bottom: 36px; }
        .brand-icon { font-size: 64px; margin-bottom: 12px; filter: drop-shadow(0 0 20px rgba(34,197,94,.4)); }
        .brand h1 {
            font-size: 22px; font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand p { color: var(--text-muted); font-size: 13px; margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        /* Individual button style */
        .btn-individual { background: linear-gradient(135deg, var(--accent-cyan), #0891b2); color: #000; }
        .btn-individual:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* Card */
        .login-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 32px;
        }

        /* Forms */
        .login-form { display: none; }
        .login-form.active { display: block; }
        .fg { margin-bottom: 18px; }
        .fg label {
            display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-muted); margin-bottom: 6px; font-weight: 700;
        }
        .fg input {
            width: 100%; padding: 14px 16px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-primary); font-family: var(--font-mono); font-size: 14px;
            transition: border-color .2s;
        }
        .fg input:focus { outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(6,182,212,.1); }
        .fg input::placeholder { color: var(--text-muted); }
        .fg .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        /* Buttons */
        .btn-login {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 800; cursor: pointer;
            font-family: var(--font-sans); transition: all .2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-team { background: linear-gradient(135deg, var(--accent-green), #16a34a); color: #000; }
        .btn-team:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-admin { background: linear-gradient(135deg, var(--accent-purple), #7c3aed); color: #fff; }
        .btn-admin:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        /* Error */
        .login-err {
            background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
            border-radius: 6px; padding: 10px 14px; color: var(--accent-red);
            font-size: 13px; margin-bottom: 14px; display: none;
        }

        /* Divider */
        .divider {
            display: flex; align-items: center; gap: 12px; margin: 24px 0;
            color: var(--text-muted); font-size: 12px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        /* Quick links */
        .quick-links { text-align: center; margin-top: 24px; }
        .quick-links a {
            color: var(--accent-cyan); text-decoration: none; font-size: 13px;
            font-weight: 600; margin: 0 12px; transition: color .2s;
        }
        .quick-links a:hover { color: var(--accent-green); }

        /* Footer */
        .login-footer {
            text-align: center; margin-top: 32px; color: var(--text-muted);
            font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
        }

        /* Animation */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .login-container { animation: fadeUp .5s ease-out; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand">
        <div class="brand-icon">⚔️</div>
        <h1>KoTH CTF Platform</h1>
        <p>King of the Hill — Login</p>
    </div>

    <div class="login-card" style="border-radius:10px;">
        <!-- Team Login -->
        <div class="login-form active" id="form-team">
            <div class="login-err" id="err-team"></div>
            <div class="fg">
                <label>Team Token</label>
                <input type="password" id="team-token" placeholder="Enter your team token..." autocomplete="off">
                <div class="hint">Token received during team registration. Contact organizer if lost.</div>
            </div>
            <button class="btn-login btn-team" onclick="loginTeam()" id="btn-team">
                ⚡ Login as Team
            </button>
            <div class="divider">or</div>
            <div style="text-align:center;">
                <a href="/register" style="color:var(--accent-cyan); text-decoration:none; font-weight:700; font-size:14px;">
                    📝 Register New Team
                </a>
            </div>
        </div>

        <!-- Individual Login -->
        <div class="login-form" id="form-individual">
            <div class="login-err" id="err-individual"></div>
            <div class="fg">
                <label>Username</label>
                <input type="text" id="ind-username" placeholder="Enter username..." autocomplete="off">
            </div>
            <div class="fg">
                <label>Password</label>
                <input type="password" id="ind-password" placeholder="Enter password..." autocomplete="off">
                <div class="hint">Individual login — use the account provided by the organizer.</div>
            </div>
            <button class="btn-login btn-individual" onclick="loginIndividual()" id="btn-individual">
                👤 Login as Individual
            </button>
        </div>
    </div>

    <div class="quick-links">
        <a href="/scoreboard">📊 View Scoreboard</a>
        <a href="/history">📈 Point History</a>
    </div>

    <div class="login-footer">
        <p>KoTH CTF Platform</p>
    </div>
</div>

<script>
const API = window.location.origin + '/api';

// Team login
async function loginTeam() {
    const token = document.getElementById('team-token').value.trim();
    const errEl = document.getElementById('err-team');
    const btn = document.getElementById('btn-team');
    if (!token) { showErr(errEl, 'Please enter team token'); return; }

    btn.disabled = true; btn.textContent = '⏳ Verifying...';
    errEl.style.display = 'none';

    try {
        const r = await fetch(API + '/auth/team', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Login failed');

        sessionStorage.setItem('koth_role', 'team');
        sessionStorage.setItem('koth_team_token', token);
        sessionStorage.setItem('koth_team', JSON.stringify(d));
        window.location.href = '/dashboard';
    } catch(e) {
        showErr(errEl, e.message);
    } finally {
        btn.disabled = false; btn.innerHTML = '⚡ Login as Team';
    }
}

// Individual login
async function loginIndividual() {
    const username = document.getElementById('ind-username').value.trim();
    const password = document.getElementById('ind-password').value;
    const errEl = document.getElementById('err-individual');
    const btn = document.getElementById('btn-individual');
    if (!username || !password) { showErr(errEl, 'Please enter username and password'); return; }

    btn.disabled = true; btn.textContent = '⏳ Verifying...';
    errEl.style.display = 'none';

    try {
        const r = await fetch(API + '/auth/individual', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Login failed');

        sessionStorage.setItem('koth_role', 'individual');
        sessionStorage.setItem('koth_individual_user', username);
        sessionStorage.setItem('koth_individual', JSON.stringify(d));
        window.location.href = '/dashboard';
    } catch(e) {
        showErr(errEl, e.message);
    } finally {
        btn.disabled = false; btn.innerHTML = '👤 Login as Individual';
    }
}

function showErr(el, msg) {
    el.textContent = msg; el.style.display = 'block';
}

// Enter key handlers
document.getElementById('team-token').addEventListener('keydown', e => { if(e.key==='Enter') loginTeam(); });
document.getElementById('ind-username').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('ind-password').focus(); });
document.getElementById('ind-password').addEventListener('keydown', e => { if(e.key==='Enter') loginIndividual(); });

// Check event mode: show individual form or team form
async function checkEventMode() {
    try {
        const r = await fetch(API + '/auth/event-mode');
        const d = await r.json();
        if (d.event_mode === 'individual') {
            document.getElementById('form-team').classList.remove('active');
            document.getElementById('form-individual').classList.add('active');
        }
    } catch(e) {}
}

// Auto-redirect if already logged in
(function checkSession() {
    const role = sessionStorage.getItem('koth_role');
    if (role === 'team' && sessionStorage.getItem('koth_team_token')) {
        window.location.href = '/dashboard';
    } else if (role === 'admin' && sessionStorage.getItem('koth_admin_token')) {
        window.location.href = '/organizer';
    } else if (role === 'individual' && sessionStorage.getItem('koth_individual_user')) {
        window.location.href = '/dashboard';
    }
})();

checkEventMode();
</script>
</body>
</html>
