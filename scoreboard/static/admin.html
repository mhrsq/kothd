<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoTH CTF — Redirecting...</title>
    <script>
        // Admin page merged into Organizer Console
        window.location.replace('/organizer');
    </script>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 32px;
        }
        .auth-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .auth-panel input {
            width: 100%;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 14px;
            margin: 12px 0;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent-green); color: #000; }
        .btn-primary:hover { background: #16a34a; }
        .btn-danger { background: var(--accent-red); color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: var(--accent-orange); color: #fff; }
        .btn-warning:hover { background: #ea580c; }
        .btn-blue { background: var(--accent-blue); color: #fff; }
        .btn-blue:hover { background: #2563eb; }
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        .admin-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }
        .admin-card h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            color: var(--accent-cyan);
        }
        .game-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: var(--text-muted); }
        .stat-value { font-family: var(--font-mono); font-weight: 700; }
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 13px;
        }
        .alert {
            padding: 10px 16px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .alert-success { background: rgba(34,197,94,0.2); color: var(--accent-green); border: 1px solid rgba(34,197,94,0.3); }
        .alert-error { background: rgba(239,68,68,0.2); color: var(--accent-red); border: 1px solid rgba(239,68,68,0.3); }
        .audit-list { max-height: 400px; overflow-y: auto; }
        .audit-item {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-family: var(--font-mono);
        }
        .audit-item .audit-type { color: var(--accent-cyan); font-weight: 700; }
        .audit-item .audit-time { color: var(--text-muted); }
        #admin-panel { display: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">🛡️</div>
            <div>
                <h1>KoTH CTF — ADMIN PANEL</h1>
                <p class="subtitle">Game Management Console</p>
            </div>
        </div>
        <div class="header-right">
            <a href="/" class="btn btn-blue" style="text-decoration:none;">← Scoreboard</a>
        </div>
    </header>

    <!-- Auth -->
    <div id="auth-panel" class="auth-panel">
        <h2 style="margin-bottom:8px;">🔐 Admin Login</h2>
        <p style="color:var(--text-muted); font-size:13px;">Enter admin token</p>
        <input type="password" id="admin-token" placeholder="Admin Token" onkeypress="if(event.key==='Enter') authenticate()">
        <br>
        <button class="btn btn-primary" onclick="authenticate()">Login</button>
        <div id="auth-error" class="alert alert-error" style="display:none; margin-top:12px;"></div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="admin-container">
        <div id="admin-alert"></div>

        <div class="admin-grid">
            <!-- Game Control -->
            <div class="admin-card">
                <h3>🎮 Game Control</h3>
                <div id="game-stats">Loading...</div>
                <div class="game-controls" style="margin-top:16px;">
                    <button class="btn btn-primary" onclick="gameControl('start')">▶ Start</button>
                    <button class="btn btn-warning" onclick="gameControl('pause')">⏸ Pause</button>
                    <button class="btn btn-primary" onclick="gameControl('resume')">⏯ Resume</button>
                    <button class="btn btn-danger" onclick="gameControl('stop')">⏹ Stop</button>
                </div>
                <button class="btn btn-danger" style="margin-top:16px; width:100%;"
                        onclick="if(confirm('RESET all game data?')) resetGame()">
                    🗑️ Reset Game
                </button>
            </div>

            <!-- Register Team -->
            <div class="admin-card">
                <h3>👥 Register Team</h3>
                <div class="form-group">
                    <label>Team Name</label>
                    <input type="text" id="team-name" placeholder="TeamAlpha">
                </div>
                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" id="team-display" placeholder="Team Alpha">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="team-category">
                        <option value="default">Default</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>VPN IP (optional)</label>
                    <input type="text" id="team-vpn" placeholder="10.10.0.x">
                </div>
                <button class="btn btn-primary" onclick="registerTeam()">Register Team</button>
            </div>

            <!-- Score Adjustment -->
            <div class="admin-card">
                <h3>⚖️ Score Adjustment</h3>
                <div class="form-group">
                    <label>Team ID</label>
                    <input type="number" id="adj-team-id" placeholder="1">
                </div>
                <div class="form-group">
                    <label>Points (+/-)</label>
                    <input type="number" id="adj-points" placeholder="-50">
                </div>
                <div class="form-group">
                    <label>Reason</label>
                    <input type="text" id="adj-reason" placeholder="Penalty: service tampering">
                </div>
                <button class="btn btn-warning" onclick="adjustScore()">Adjust Score</button>
            </div>

            <!-- Active Teams -->
            <div class="admin-card">
                <h3>📋 Registered Teams</h3>
                <div id="teams-list">Loading...</div>
            </div>

            <!-- Audit Log -->
            <div class="admin-card" style="grid-column: span 2;">
                <h3>📝 Audit Log</h3>
                <div class="audit-list" id="audit-log">Loading...</div>
            </div>
        </div>
    </div>

    <script>
    let adminToken = '';
    const API_BASE = window.location.origin + '/api';

    function authenticate() {
        adminToken = document.getElementById('admin-token').value;
        if (!adminToken) return;

        fetch(`${API_BASE}/admin/stats`, {
            headers: { 'X-Admin-Token': adminToken }
        })
        .then(r => {
            if (!r.ok) throw new Error('Invalid token');
            return r.json();
        })
        .then(() => {
            document.getElementById('auth-panel').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            refreshAll();
            setInterval(refreshAll, 5000);
        })
        .catch(e => {
            document.getElementById('auth-error').style.display = 'block';
            document.getElementById('auth-error').textContent = 'Invalid token';
        });
    }

    function apiCall(url, options = {}) {
        options.headers = {
            ...(options.headers || {}),
            'X-Admin-Token': adminToken,
            'Content-Type': 'application/json'
        };
        return fetch(url, options);
    }

    function showAlert(msg, type = 'success') {
        const el = document.getElementById('admin-alert');
        el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        setTimeout(() => el.innerHTML = '', 5000);
    }

    async function refreshAll() {
        await Promise.all([refreshStats(), refreshTeams(), refreshAudit()]);
    }

    async function refreshStats() {
        try {
            const r = await apiCall(`${API_BASE}/admin/stats`);
            const d = await r.json();
            const el = document.getElementById('game-stats');
            el.innerHTML = `
                <div class="stat-row"><span class="stat-label">Status</span><span class="stat-value">${d.game_status}</span></div>
                <div class="stat-row"><span class="stat-label">Current Tick</span><span class="stat-value">#${d.current_tick}</span></div>
                <div class="stat-row"><span class="stat-label">Elapsed</span><span class="stat-value">${(d.game_status==='not_started'||d.game_status==='finished') ? '--:--:--' : formatTime(d.elapsed_seconds)}</span></div>
                <div class="stat-row"><span class="stat-label">Remaining</span><span class="stat-value">${(d.game_status==='not_started'||d.game_status==='finished') ? '--:--:--' : formatTime(d.remaining_seconds)}</span></div>
                <div class="stat-row"><span class="stat-label">Teams</span><span class="stat-value">${d.teams_count}</span></div>
                <div class="stat-row"><span class="stat-label">Hills</span><span class="stat-value">${d.hills_count}</span></div>
                <div class="stat-row"><span class="stat-label">First Bloods</span><span class="stat-value">${d.first_bloods_count}</span></div>
                <div class="stat-row"><span class="stat-label">WS Connections</span><span class="stat-value">${d.ws_connections}</span></div>
                <div class="stat-row"><span class="stat-label">Frozen</span><span class="stat-value">${d.is_frozen ? 'YES' : 'No'}</span></div>
            `;
        } catch(e) { console.error(e); }
    }

    async function refreshTeams() {
        try {
            const r = await fetch(`${API_BASE}/teams`);
            const teams = await r.json();
            const el = document.getElementById('teams-list');
            if (teams.length === 0) { el.innerHTML = '<p style="color:var(--text-muted);">No teams yet</p>'; return; }
            el.innerHTML = teams.map(t => `
                <div class="stat-row">
                    <span class="stat-label">#${t.id} ${t.name}</span>
                    <span class="stat-value category-badge ${t.category}">${t.category || 'default'}</span>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function refreshAudit() {
        try {
            const r = await apiCall(`${API_BASE}/admin/audit?limit=50`);
            const logs = await r.json();
            const el = document.getElementById('audit-log');
            if (logs.length === 0) { el.innerHTML = '<p style="color:var(--text-muted);">No logs yet</p>'; return; }
            el.innerHTML = logs.map(l => `
                <div class="audit-item">
                    <span class="audit-type">[${l.event_type}]</span>
                    <span>${JSON.stringify(l.details)}</span>
                    <span class="audit-time">${l.created_at || ''}</span>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function gameControl(action) {
        try {
            const r = await apiCall(`${API_BASE}/admin/game/control`, {
                method: 'POST',
                body: JSON.stringify({ action })
            });
            const d = await r.json();
            if (r.ok) {
                showAlert(`Game ${action}: ${d.detail}`);
            } else {
                showAlert(d.detail || 'Error', 'error');
            }
            refreshStats();
        } catch(e) { showAlert(e.message, 'error'); }
    }

    async function resetGame() {
        try {
            const r = await apiCall(`${API_BASE}/admin/game/reset`, { method: 'POST' });
            const d = await r.json();
            if (r.ok) showAlert(d.detail);
            else showAlert(d.detail || 'Error', 'error');
            refreshAll();
        } catch(e) { showAlert(e.message, 'error'); }
    }

    async function registerTeam() {
        const name = document.getElementById('team-name').value;
        const display = document.getElementById('team-display').value;
        const category = document.getElementById('team-category').value;
        const vpn = document.getElementById('team-vpn').value;

        if (!name) { showAlert('Team name required', 'error'); return; }

        try {
            const r = await apiCall(`${API_BASE}/teams`, {
                method: 'POST',
                body: JSON.stringify({
                    name, display_name: display || name, category, vpn_ip: vpn || null
                })
            });
            const d = await r.json();
            if (r.ok) {
                showAlert(`Team "${name}" registered (ID: ${d.id})`);
                document.getElementById('team-name').value = '';
                document.getElementById('team-display').value = '';
                document.getElementById('team-vpn').value = '';
                refreshTeams();
            } else {
                showAlert(d.detail || 'Error', 'error');
            }
        } catch(e) { showAlert(e.message, 'error'); }
    }

    async function adjustScore() {
        const teamId = parseInt(document.getElementById('adj-team-id').value);
        const points = parseInt(document.getElementById('adj-points').value);
        const reason = document.getElementById('adj-reason').value;

        if (!teamId || isNaN(points) || !reason) {
            showAlert('All fields are required', 'error');
            return;
        }

        try {
            const r = await apiCall(`${API_BASE}/admin/score/adjust`, {
                method: 'POST',
                body: JSON.stringify({ team_id: teamId, points, reason })
            });
            const d = await r.json();
            if (r.ok) showAlert(d.detail);
            else showAlert(d.detail || 'Error', 'error');
        } catch(e) { showAlert(e.message, 'error'); }
    }

    function formatTime(sec) {
        if (sec === null || sec === undefined || sec < 0) return '--:--:--';
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = sec % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    </script>
    <script src="/static/js/navbar.js"></script>
</body>
</html>
