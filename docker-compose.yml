# =============================================================
# KoTH CTF Platform — Docker Compose
# Main Orchestration (KoTH Server)
# =============================================================

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: koth-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scoreboard/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    networks:
      - koth-internal

  # Redis Cache & PubSub
  redis:
    image: redis:7-alpine
    container_name: koth-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    networks:
      - koth-internal

  # Scoreboard API + Tick Engine
  scoreboard:
    build:
      context: ./scoreboard
      dockerfile: Dockerfile
    container_name: koth-scoreboard
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - API_HOST=${API_HOST}
      - API_PORT=${API_PORT}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - API_ADMIN_TOKEN=${API_ADMIN_TOKEN}
      - API_DEBUG=${API_DEBUG}
      - TICK_INTERVAL=${TICK_INTERVAL}
      - TICK_GRACE_PERIOD=${TICK_GRACE_PERIOD}
      - TICK_FREEZE_BEFORE_END=${TICK_FREEZE_BEFORE_END}
      - GAME_DURATION_HOURS=${GAME_DURATION_HOURS}
      - BASE_POINTS=${BASE_POINTS}
      - PIVOT_MULTIPLIER=${PIVOT_MULTIPLIER}
      - FIRST_BLOOD_BONUS=${FIRST_BLOOD_BONUS}
      - DEFENSE_STREAK_BONUS=${DEFENSE_STREAK_BONUS}
      - SCOREBOT_HOST=scorebot
      - SCOREBOT_PORT=${SCOREBOT_PORT}
      - SCOREBOT_CHECK_TIMEOUT=${SCOREBOT_CHECK_TIMEOUT:-15}
      - REGISTRATION_CODE=${REGISTRATION_CODE}
      - REGISTRATION_ENABLED=${REGISTRATION_ENABLED:-true}
      - EVENT_NAME=${EVENT_NAME:-KoTH CTF}
      - EVENT_SUBTITLE=${EVENT_SUBTITLE:-King of the Hill Competition}
    ports:
      - "8000:8000"
    volumes:
      - ./scoreboard/app:/app/app:ro
      - ./scoreboard/static:/app/static:ro
      - scorebot_keys:/app/keys
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    networks:
      - koth-internal

  # Scorebot (Go Hill Checker)
  scorebot:
    build:
      context: ./scorebot
      dockerfile: Dockerfile
    container_name: koth-scorebot
    restart: always
    environment:
      - SCOREBOT_PORT=${SCOREBOT_PORT}
      - HILL_SSH_USER=root
      - HILL_SSH_PASS=${HILL_SSH_PASS}
      - HILL_SSH_KEY=/app/keys/scorebot_key
      - CHECK_TIMEOUT=${SCOREBOT_CHECK_TIMEOUT}
      - HILL1_IP=${HILL1_IP}
      - HILL1_PORT=${HILL1_PORT}
      - HILL2_IP=${HILL2_IP}
      - HILL2_PORT=${HILL2_PORT}
      - HILL3_IP=${HILL3_IP}
      - HILL3_PORT=${HILL3_PORT}
      - HILL4_IP=${HILL4_IP}
      - HILL4_PORT=${HILL4_PORT}
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - scorebot_keys:/app/keys
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    networks:
      - koth-internal

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: koth-nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - scoreboard
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M
      - /var/cache/nginx:size=64M
    networks:
      - koth-internal

volumes:
  postgres_data:
  redis_data:
  scorebot_keys:

networks:
  koth-internal:
    driver: bridge
